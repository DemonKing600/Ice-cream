<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ice Cream Quiz 🍦</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* GLASS CARD */
.quiz-box {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 600px;
    text-align: center;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* NAV */
nav {
    position: absolute;
    top: 10px;
    left: 20px;
}
nav a {
    color: white;
    margin-right: 15px;
    text-decoration: none;
}

/* PROGRESS BAR */
.progress {
    height: 10px;
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
}
.progress-bar {
    height: 100%;
    width: 0%;
    background: #ff4da6;
}

/* BUTTONS */
button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 10px;
    background: #ff4da6;
    color: white;
    cursor: pointer;
}

/* TIMER */
#timer {
    font-weight: bold;
    margin-bottom: 10px;
}

</style>
</head>

<body>

<nav>
    <a href="index.html">Explore</a>
    <a href="quiz.html">Quiz</a>
    <a href="gallery.html">Gallery</a>
</nav>

<div class="quiz-box">

    <h1>🍦 Ice Cream Quiz</h1>

    <div class="progress">
        <div class="progress-bar" id="progress"></div>
    </div>

    <div id="timer">⏱ Time: 10</div>

    <h2 id="question"></h2>
    <div id="options"></div>

    <p id="result"></p>

</div>

<!-- SOUND -->
<audio id="correctSound" src="https://www.soundjay.com/button/sounds/button-3.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/button/sounds/button-10.mp3"></audio>

<script>
const quiz = [
    { q:"Which country is famous for Gelato?", options:["USA","Italy","India"], answer:"Italy" },
    { q:"Most popular flavor?", options:["Vanilla","Mint","Coffee"], answer:"Vanilla" },
    { q:"Dairy-free ice cream?", options:["Gelato","Sorbet","Custard"], answer:"Sorbet" },
    { q:"Ice cream melts due to?", options:["Heat","Cold","Wind"], answer:"Heat" }
];

let index = 0, score = 0, time = 10, timer;

function loadQuestion() {
    clearInterval(timer);
    time = 10;
    document.getElementById("timer").innerText = "⏱ Time: " + time;

    timer = setInterval(() => {
        time--;
        document.getElementById("timer").innerText = "⏱ Time: " + time;
        if(time === 0) {
            nextQuestion();
        }
    },1000);

    let q = quiz[index];
    document.getElementById("question").innerText = q.q;

    let html="";
    q.options.forEach(opt=>{
        html += `<button onclick="check('${opt}')">${opt}</button>`;
    });
    document.getElementById("options").innerHTML = html;

    updateProgress();
}

function check(ans){
    clearInterval(timer);

    if(ans === quiz[index].answer){
        score++;
        document.getElementById("result").innerText="✅ Correct!";
        document.getElementById("correctSound").play();
    } else {
        document.getElementById("result").innerText="❌ Wrong!";
        document.getElementById("wrongSound").play();
    }

    setTimeout(nextQuestion,1000);
}

function nextQuestion(){
    index++;
    document.getElementById("result").innerText="";
    if(index < quiz.length){
        loadQuestion();
    } else {
        showScore();
    }
}

function updateProgress(){
    let percent = ((index)/quiz.length)*100;
    document.getElementById("progress").style.width = percent + "%";
}

function showScore(){
    document.querySelector(".quiz-box").innerHTML = `
        <h1>🎉 Completed!</h1>
        <h2>Score: ${score}/${quiz.length}</h2>
        <button onclick="restart()">Restart</button>
    `;
}

function restart(){
    index=0;
    score=0;
    loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
